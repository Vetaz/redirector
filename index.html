<!doctype html>
<html>
  <body>
    <p>On Redirector</p>
    <script>
      if (window.opener) {
        window.opener.postMessage({ type: 'AUTH_SUCCESS', hash: window.location.hash }, '*')
      } else {
        console.error('No opener — cannot send message')
      }

      window.close()
    </script>
  </body>
</html>
