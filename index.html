<!doctype html>
<html>
  <body>
    <p>On Redirector</p>
    <script>
      // Send the hash back to the opener (your extension popup)
      window.opener.postMessage({ type: 'AUTH_SUCCESS', hash: window.location.hash }, '*')

      // Close the redirector window
      window.close()
    </script>
  </body>
</html>
